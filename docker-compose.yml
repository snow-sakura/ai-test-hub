"""
AI-HUB 本地开发环境 Docker Compose

启动服务：
    docker compose up -d

停止服务：
    docker compose down

仅启动基础设施（MySQL + Redis）：
    docker compose up -d mysql redis
"""

version: "3.8"

services:
  # ========== MySQL 8.0 ==========
  mysql:
    image: mysql:8.0
    container_name: ai-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_hub_test
      MYSQL_USER: snow
      MYSQL_PASSWORD: Wxh123456!
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis 7 ==========
  redis:
    image: redis:7
    container_name: ai-hub-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== AI-HUB 后端应用 ==========
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-hub-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
