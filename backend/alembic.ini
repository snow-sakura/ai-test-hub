# Alembic 数据库迁移配置文件
#
# 使用方式：
#     cd backend/
#     alembic revision --autogenerate -m "描述信息"
#     alembic upgrade head

[alembic]
# 迁移脚本存放路径
script_location = alembic

# SQLAlchemy URL（使用 sqlalchemy.url 变量，实际值在 env.py 中动态设置）
# 暂不使用预配置 URL，由 env.py 从 app.config 读取
# sqlalchemy.url =

# 日志格式
log_file = alembic.log

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
